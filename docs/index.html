<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>galaxy-tool-util</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="TypeScript toolkit for Galaxy tool metadata">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Atkinson Hyperlegible — Galaxy's accessibility font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/atkinson-hyperlegible@5/400.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/atkinson-hyperlegible@5/700.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/atkinson-hyperlegible@5/400-italic.min.css">
  <!-- Docsify base theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <!-- Plugins -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-copy-code/styles.min.css">
  <!-- Galaxy overrides -->
  <link rel="stylesheet" href="styles/galaxy.css">
  <link rel="stylesheet" href="styles/prism-galaxy.css">
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'galaxy-tool-util',
      repo: 'jmchilton/galaxy-tool-util',
      homepage: 'README.md',
      loadSidebar: '_sidebar.md',
      loadNavbar: '_navbar.md',
      coverpage: '_coverpage.md',
      autoHeader: true,
      maxLevel: 3,
      subMaxLevel: 2,

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search documentation...',
        noData: 'No results found'
      },

      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied!'
      },

      formatUpdated: '{MM}/{DD} {HH}:{mm}',

      plugins: [
        function(hook, vm) {
          hook.beforeEach(function (html) {
            return html
              + '\n\n'
              + '---'
              + '\n'
              + '**Last updated:** ' + new Date().toLocaleString();
          })
        }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
</body>
</html>
