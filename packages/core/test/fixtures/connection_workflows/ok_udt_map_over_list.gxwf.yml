class: GalaxyWorkflow
inputs:
  list_in:
    type: collection
    collection_type: list
steps:
  the_udt:
    run:
      class: GalaxyUserTool
      id: cat_user_defined
      name: cat_user_defined
      version: '0.1'
      container: busybox
      shell_command: cat '$(inputs.input1.path)' > output.txt
      inputs:
        - name: input1
          type: data
          format: txt
      outputs:
        - name: output1
          type: data
          format: txt
          from_work_dir: output.txt
    state: {}
    in:
      input1: list_in
