class: GalaxyWorkflow
inputs:
  data_in: data
steps:
  inner_wf:
    run:
      class: GalaxyWorkflow
      inputs:
        inner_in: data
      outputs:
        inner_out:
          outputSource: inner_cat/output
      steps:
        inner_cat:
          tool_id: gx_data
          in:
            parameter: inner_in
    in:
      inner_in: data_in
  outer_cat:
    tool_id: gx_data
    in:
      parameter: inner_wf/inner_out
