# --- IWC workflows ---

clean_iwc_repeatmasking_bookkeeping_stripped:
  fixture: RepeatMasking-Workflow.ga
  operation: clean
  assertions:
    - path: [steps, "1", tool_state, __page__]
      value_absent: true
    - path: [steps, "1", tool_state, __rerun_remap_job_id__]
      value_absent: true
    - path: [steps, "1", tool_state, chromInfo]
      value_absent: true
    - path: [steps, "1", tool_state, __input_ext]
      value_absent: true

clean_iwc_repeatmasking_valid_inputs_survive:
  fixture: RepeatMasking-Workflow.ga
  operation: clean
  assertions:
    # connection-only inputs are null after cleaning
    - path: [steps, "1", tool_state, input_file]
      value: null
    - path: [steps, "2", tool_state, repeat_source]
      value_type: dict
    - path: [steps, "2", tool_state, input_fasta]
      value: null

clean_iwc_rnaseq_subworkflow_bookkeeping_stripped:
  fixture: rnaseq-sr.ga
  operation: clean
  assertions:
    # tool step in main workflow
    - path: [steps, "10", tool_state, __page__]
      value_absent: true
    - path: [steps, "10", tool_state, __rerun_remap_job_id__]
      value_absent: true
    # tool step inside subworkflow (step 17, sub-step 2)
    - path: [steps, "17", subworkflow, steps, "2", tool_state, __page__]
      value_absent: true
    - path: [steps, "17", subworkflow, steps, "2", tool_state, __rerun_remap_job_id__]
      value_absent: true

clean_iwc_rnaseq_subworkflow_valid_inputs_survive:
  fixture: rnaseq-sr.ga
  operation: clean
  assertions:
    # tp_awk_tool inside "Generate Unstranded Coverage" subworkflow
    - path: [steps, "17", subworkflow, steps, "2", tool_state, code]
      value_type: str
    - path: [steps, "17", subworkflow, steps, "2", tool_state, infile, __class__]
      value: ConnectedValue
    - path: [steps, "17", subworkflow, steps, "2", tool_state, variables]
      value_type: list
    # subworkflow structure preserved
    - path: [steps, "17", type]
      value: subworkflow
    - path: [steps, "17", label]
      value: Generate Unstranded Coverage
