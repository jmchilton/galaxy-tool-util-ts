clean_iwc_rnaseq_subworkflow_bookkeeping_stripped:
  fixture: rnaseq-sr.ga
  operation: clean
  assertions:
    # tool step in main workflow
    - path: [steps, "10", tool_state, __page__]
      value_absent: true
    - path: [steps, "10", tool_state, __rerun_remap_job_id__]
      value_absent: true
    # tool step inside subworkflow (step 17, sub-step 2)
    - path: [steps, "17", subworkflow, steps, "2", tool_state, __page__]
      value_absent: true
    - path: [steps, "17", subworkflow, steps, "2", tool_state, __rerun_remap_job_id__]
      value_absent: true

# --- Structural step cleaning ---

clean_strips_step_uuid:
  fixture: rnaseq-sr.ga
  operation: clean
  assertions:
    - path: [steps, "10", uuid]
      value_absent: true

clean_preserves_step_position:
  fixture: rnaseq-sr.ga
  operation: clean
  assertions:
    - path: [steps, "10", position]
      value_type: dict

clean_strips_subworkflow_position_extras:
  fixture: real-sars-cov2-variant-calling.ga
  operation: clean
  assertions:
    - path: [steps, "2", subworkflow, steps, "0", position, bottom]
      value_absent: true
    - path: [steps, "2", subworkflow, steps, "0", position, x]
      value_absent: true
    - path: [steps, "2", subworkflow, steps, "0", position, y]
      value_absent: true
    - path: [steps, "2", subworkflow, steps, "0", position, right]
      value_absent: true
    - path: [steps, "2", subworkflow, steps, "0", position, height]
      value_absent: true
    - path: [steps, "2", subworkflow, steps, "0", position, width]
      value_absent: true
    - path: [steps, "2", subworkflow, steps, "0", position, left]
      value_type: float
    - path: [steps, "2", subworkflow, steps, "0", position, top]
      value_type: float


clean_skip_uuid_preserves_uuid:
