# Declarative tests for the clean operation.
# Operations return the cleaned workflow dict directly;
# assertions navigate its structure.

clean_synthetic_cat1_bookkeeping_stripped:
  fixture: synthetic-cat1-stale.ga
  operation: clean
  assertions:
    - path: [steps, "1", tool_state, __page__]
      value_absent: true
    - path: [steps, "1", tool_state, __rerun_remap_job_id__]
      value_absent: true
    - path: [steps, "1", tool_state, chromInfo]
      value_absent: true

clean_synthetic_cat1_valid_inputs_survive:
  fixture: synthetic-cat1-stale.ga
  operation: clean
  assertions:
    - path: [steps, "1", tool_state, input1]
      value_type: dict
    - path: [steps, "1", tool_state, queries]
      value_type: list
    - path: [steps, "1", tool_id]
      value: cat1

# --- Format2 input ---

clean_format2_noop:
  fixture: synthetic-cat1.gxwf.yml
  operation: clean
  assertions:
    - path: [steps, concat, tool_id]
      value: cat1
    - path: [steps, concat, state, queries]
      value_type: list

clean_format2_stale_keys_stripped:
  fixture: synthetic-cat1-stale.gxwf.yml
  operation: clean
  assertions:
    - path: [steps, concat, state, chromInfo]
      value_absent: true
    - path: [steps, concat, state, stale_param]
      value_absent: true
    - path: [steps, concat, state, queries]
      value_type: list

# --- IWC workflows ---

clean_iwc_repeatmasking_bookkeeping_stripped:
