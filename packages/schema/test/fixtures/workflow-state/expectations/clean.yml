# ---

clean_iwc_rnaseq_subworkflow_valid_inputs_survive:
  fixture: rnaseq-sr.ga
  operation: clean
  assertions:
    # tp_awk_tool inside "Generate Unstranded Coverage" subworkflow
    - path: [steps, "17", subworkflow, steps, "2", tool_state, code]
      value_type: str
    - path: [steps, "17", subworkflow, steps, "2", tool_state, infile, __class__]
      value: ConnectedValue
    - path: [steps, "17", subworkflow, steps, "2", tool_state, variables]
      value_type: list
    # subworkflow structure preserved
    - path: [steps, "17", type]
      value: subworkflow
    - path: [steps, "17", label]
      value: Generate Unstranded Coverage
